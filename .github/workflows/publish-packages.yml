name: Build and publish packages

permissions:
  contents: read

on:
  push:
    branches:
      - publish

jobs:
  create-sdist:
    name: Build source distribution

    runs-on: ubuntu-24.04

    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Python 3.8
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: '3.8'

      - name: Install pypa/build
        run: |
          python3.8 -m pip install build

      - name: Create sdist
        run: |
          python3.8 -m build --sdist

      - name: Upload artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          path: dist/*.tar.gz
          archive: false


  build-wheels:
    name: Build wheels

    strategy:
      matrix:
        include:
          - image: quay.io/pypa/manylinux2014_x86_64
            platform: manylinux2014_x86_64
            runner: ubuntu-24.04
            pre_cmd: ""

          - image: quay.io/pypa/manylinux2014_i686
            platform: manylinux2014_i686
            runner: ubuntu-24.04
            pre_cmd: linux32

          - image: quay.io/pypa/musllinux_1_2_x86_64
            platform: musllinux_1_2_x86_64
            runner: ubuntu-24.04
            pre_cmd: ""

          - image: quay.io/pypa/musllinux_1_2_i686
            platform: musllinux_1_2_i686
            runner: ubuntu-24.04
            pre_cmd: ""

          - image: quay.io/pypa/manylinux2014_aarch64
            platform: manylinux2014_aarch64
            runner: ubuntu-24.04-arm
            pre_cmd: ""

    runs-on: ${{ matrix.runner }}

    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - name: Build wheels
        run: >
          docker run --rm
          --volume $(pwd -P):/pkg --env PLAT=${{ matrix.platform }}
          ${{ matrix.image }} ${{ matrix.pre_cmd }} /pkg/utils/build-wheels.sh

      - name: Upload artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          path: wheelhouse/*.whl
          archive: false


  publish-to-testpypi:
    name: Publish distributions to TestPyPI

    permissions:
      id-token: write

    environment:
      name: testpypi
      url: https://test.pypi.org/p/ARver

    runs-on: ubuntu-24.04

    needs:
      - create-sdist
      - build-wheels

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          path: dist
          merge-multiple: true

      - name: Show artifacts
        run: tree

      - name: Upload to TestPyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b  # v1.14.0
        with:
          repository-url: https://test.pypi.org/legacy/
          skip-existing: true
