name: Sync mirrors

permissions:
  contents: read

on:
  push:
    branches:
      - master
    tags:
      - 'v*'

jobs:
  sync-mirrors:
    name: Sync external mirrors

    runs-on: ubuntu-24.04

    strategy:
      matrix:
        remote:
          - 'ssh://git@gitlab.com/arcctgx/ARver.git'
          - 'ssh://git@codeberg.org/arcctgx/ARver.git'

    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Sync mirror
        uses: yesolutions/mirror-action@1708f16cdb28634fd3ba10c5c79abc91f5578a14  # v0.7.0
        with:
          REMOTE: ${{ matrix.remote }}
          GIT_SSH_PRIVATE_KEY: ${{ secrets.ARVER_SYNC_PRIVATE_SSH_KEY }}
          GIT_SSH_NO_VERIFY_HOST: true
          PUSH_ALL_REFS: false
